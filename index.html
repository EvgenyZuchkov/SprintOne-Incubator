<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
          rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>
<section class="card-section">
    <div class="card">
        <div class="product-images-block">
            <div class="main-img-wrapper">
                <img class="main-img" width="300" height="322" src="assets/images/main-image.png" alt="">
            </div>

            <div class="preview-wrapper">
                <div class="preview selected">
                    <img src="assets/images/image-1.png" alt="">
                </div>
                <div class="preview">
                    <img src="assets/images/image-2.png" alt="">
                </div>
            </div>
        </div>
        <div>
            <h1 class="card-title">Fluted Contrast</h1>
            <span class="subtitle">Mug / 33 cl</span>
            <p class="description">
                Fluted Contrast represents the perfect fusion between the
                aesthetic and the functional. The design is elegant and modern,
                created out of a deep respect for Royal British history and traditions
            </p>
            <div>
                <h2 class="option-title">Color options</h2>
                <ul>
                    <li class="selected">
                        <div class="circle blue"></div>
                    </li>
                    <li>
                        <div class="circle green"></div>
                    </li>
                    <li>
                        <div class="circle red"></div>
                    </li>
                    <li>
                        <div class="circle black"></div>
                    </li>
                    <li>
                        <div class="circle yellow"></div>
                    </li>
                </ul>
            </div>
            <div>
                <div>
                    <h2 class="option-title">Quantity</h2>
                    <select class="quantity" name="quantity" id="quantity">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>
                <div>
                    <h2 class="option-title">Price</h2>
                    <span class="price"><span>eur</span> <span>39,00</span></span>
                </div>
            </div>
            <button class="card-btn">Add To Basket</button>
        </div>
    </div>
</section>
</body>
</html>
